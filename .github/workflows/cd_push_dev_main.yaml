name: CD Push dev-main

on:
  push:
    branches: [ dev-main ]
  workflow_dispatch:

env:
  DOCKERHUB_REPO: crisalidesr/crisalid-org-registry
  DEV_LINE: 1.0 # bump manually when you move the dev line

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (dev tags)
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          file: ./Dockerfile
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ env.DEV_LINE }}-dev
            ${{ env.DOCKERHUB_REPO }}:dev
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}